<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>贪吃蛇</title>
<style>
  body { margin: 0; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; color: #e2e8f0; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace; }
  .wrap { text-align: center; }
  canvas { background: #020617; border: 2px solid #334155; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); display: block; margin: 0 auto; }
  .info { margin-top: 16px; font-size: 14px; color: #94a3b8; }
  .score { font-size: 20px; color: #fbbf24; margin-bottom: 8px; }
  button { margin-top: 14px; padding: 10px 22px; border: 0; border-radius: 8px; background: #16a34a; color: white; font-size: 14px; cursor: pointer; }
  button:hover { background: #15803d; }
</style>
</head>
<body>
<div class="wrap">
  <div class="score" id="score">得分：0</div>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="info">方向键 / WASD 移动，空格 暂停</div>
  <button id="btn">重新开始</button>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const btn = document.getElementById('btn');
const TILE = 20;
const COLS = canvas.width / TILE;
const ROWS = canvas.height / TILE;
const SPEED_MAP = { easy: 240, normal: 185, hard: 145 };
const PADDING = 1;
const FOOD_COUNT = 10;
let snake, dir, nextDir, foods, score, paused, over, tick;

function reset() {
  snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
  dir = {x: 1, y: 0};
  nextDir = dir;
  score = 0;
  paused = false;
  over = false;
  updateScore();
  foods = [];
  for (let i = 0; i < FOOD_COUNT; i++) placeFood();
}

function updateScore() { scoreEl.textContent = '得分：' + score; }

function placeFood() {
  let x, y;
  let attempts = 0;
  do {
    x = Math.floor(Math.random() * (COLS - 2)) + 1;
    y = Math.floor(Math.random() * (ROWS - 2)) + 1;
    attempts++;
    if (attempts > 1000) break;
  } while (snake.some(s => s.x === x && s.y === y) || foods.some(f => f.x === x && f.y === y));
  foods.push({x, y});
}

function step() {
  if (paused || over) return;
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
  if (head.x < 0 || head.y < 0 || head.x >= COLS || head.y >= ROWS || snake.some(s => s.x === head.x && s.y === head.y)) {
    over = true; return;
  }
  snake.unshift(head);
  const eatenIdx = foods.findIndex(f => f.x === head.x && f.y === head.y);
  if (eatenIdx !== -1) {
    score += 10;
    updateScore();
    foods.splice(eatenIdx, 1);
    placeFood();
  } else {
    snake.pop();
  }
}

function draw() {
  ctx.fillStyle = '#020617';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath();
    ctx.moveTo(i * TILE + 0.5, 0);
    ctx.lineTo(i * TILE + 0.5, canvas.height);
    ctx.stroke();
  }
  for (let j = 0; j <= ROWS; j++) {
    ctx.beginPath();
    ctx.moveTo(0, j * TILE + 0.5);
    ctx.lineTo(canvas.width, j * TILE + 0.5);
    ctx.stroke();
  }

  ctx.fillStyle = '#22c55e';
  snake.forEach((s, i) => {
    if (i === 0) ctx.fillStyle = '#4ade80'; else ctx.fillStyle = '#22c55e';
    ctx.fillRect(s.x * TILE + 1, s.y * TILE + 1, TILE - 2, TILE - 2);
  });
  ctx.fillStyle = '#ef4444';
  foods.forEach(f => {
    ctx.beginPath();
    ctx.arc(f.x * TILE + TILE / 2, f.y * TILE + TILE / 2, TILE / 2 - 2, 0, Math.PI * 2);
    ctx.fill();
  });
  if (paused) { drawCenter('已暂停'); }
  if (over) { drawCenter('游戏结束'); }
}

function drawCenter(text) {
  ctx.fillStyle = 'rgba(2,6,23,0.6)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#fbbf24';
  ctx.font = 'bold 32px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, canvas.width / 2, canvas.height / 2);
}

function loop() {
  step(); draw(); tick = setTimeout(loop, SPEED_MAP.normal);
}

document.addEventListener('keydown', (e) => {
  const map = {
    ArrowUp: {x: 0, y: -1}, w: {x: 0, y: -1}, W: {x: 0, y: -1},
    ArrowDown: {x: 0, y: 1}, s: {x: 0, y: 1}, S: {x: 0, y: 1},
    ArrowLeft: {x: -1, y: 0}, a: {x: -1, y: 0}, A: {x: -1, y: 0},
    ArrowRight: {x: 1, y: 0}, d: {x: 1, y: 0}, D: {x: 1, y: 0}
  };
  if (e.key === ' ' || e.code === 'Space') { e.preventDefault(); paused = !paused; }
  const nd = map[e.key];
  if (nd) {
    e.preventDefault();
    if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
  }
});

btn.addEventListener('click', () => { clearTimeout(tick); reset(); loop(); });
reset(); loop();
</script>
</body>
</html>
